<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <pattern id="corduroyGray" x="0" y="0" width="16" height="4" patternUnits="userSpaceOnUse">
      <rect width="16" height="4" fill="#787878"/>
      <rect x="0" y="0" width="7" height="4" fill="#686868" rx="1"/>
      <rect x="9" y="0" width="7" height="4" fill="#686868" rx="1"/>
    </pattern>
    <pattern id="corduroyGrayDark" x="0" y="0" width="16" height="4" patternUnits="userSpaceOnUse">
      <rect width="16" height="4" fill="#4A4A4A"/>
      <rect x="0" y="0" width="7" height="4" fill="#3A3A3A" rx="1"/>
      <rect x="9" y="0" width="7" height="4" fill="#3A3A3A" rx="1"/>
    </pattern>
    <linearGradient id="shortsShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0.2"/>
      <stop offset="35%" stop-color="#000" stop-opacity="0"/>
      <stop offset="65%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="shortsVGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadowS">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="#0F0F0F"/>

  <!-- Waistband -->
  <rect x="185" y="240" width="430" height="50" rx="4" fill="#222"/>
  <rect x="185" y="240" width="430" height="50" rx="4" fill="url(#corduroyGrayDark)" opacity="0.7"/>
  <!-- Drawstring channel -->
  <line x1="185" y1="258" x2="615" y2="258" stroke="#333" stroke-width="2"/>
  <line x1="185" y1="278" x2="615" y2="278" stroke="#333" stroke-width="2"/>
  <!-- Drawstring -->
  <path d="M340,265 Q380,255 400,265 Q420,275 460,265" stroke="#C8A97A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="340" cy="265" r="5" fill="#C8A97A"/>
  <circle cx="460" cy="265" r="5" fill="#C8A97A"/>
  <!-- Belt loops -->
  <rect x="255" y="234" width="13" height="24" rx="3" fill="#1A1A1A"/>
  <rect x="393" y="234" width="13" height="24" rx="3" fill="#1A1A1A"/>
  <rect x="531" y="234" width="13" height="24" rx="3" fill="#1A1A1A"/>

  <!-- Shorts body -->
  <g filter="url(#shadowS)">
    <!-- Left leg -->
    <path d="M185,288 L395,288 L400,660 L360,680 L300,678 L240,660 L185,288 Z" fill="url(#corduroyGray)"/>
    <!-- Right leg -->
    <path d="M615,288 L405,288 L400,660 L440,680 L500,678 L560,660 L615,288 Z" fill="url(#corduroyGray)"/>
    <!-- Shade -->
    <path d="M185,288 L395,288 L400,660 L360,680 L300,678 L240,660 L185,288 Z" fill="url(#shortsShade)"/>
    <path d="M615,288 L405,288 L400,660 L440,680 L500,678 L560,660 L615,288 Z" fill="url(#shortsShade)"/>

    <!-- Center seam -->
    <path d="M400,288 L400,660" stroke="#555" stroke-width="2.5" fill="none" opacity="0.7"/>
    <!-- Crotch arch -->
    <path d="M310,288 Q355,355 400,360 Q445,355 490,288" fill="#787878" opacity="0.25"/>

    <!-- Leg crease -->
    <line x1="295" y1="330" x2="315" y2="640" stroke="#999" stroke-width="1" opacity="0.2"/>
    <line x1="505" y1="330" x2="485" y2="640" stroke="#999" stroke-width="1" opacity="0.2"/>

    <!-- Bottom hem with raw edge detail -->
    <path d="M185,285 Q295,305 395,290" stroke="#555" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M405,290 Q505,305 615,285" stroke="#555" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- Hem cuff left -->
    <path d="M240,660 L300,678 L360,680 L400,660 L400,680 L360,700 L300,698 L240,678 Z" fill="#5A5A5A" opacity="0.6"/>
    <!-- Hem cuff right -->
    <path d="M560,660 L500,678 L440,680 L400,660 L400,680 L440,700 L500,698 L560,678 Z" fill="#5A5A5A" opacity="0.6"/>

    <!-- Pocket left -->
    <path d="M200,310 Q210,360 205,400" stroke="#4A4A4A" stroke-width="2.5" fill="none" opacity="0.8"/>
    <!-- Pocket right -->
    <path d="M600,310 Q590,360 595,400" stroke="#4A4A4A" stroke-width="2.5" fill="none" opacity="0.8"/>

    <!-- Vertical grad -->
    <path d="M185,288 L615,288 L615,660 L400,680 L185,660 Z" fill="url(#shortsVGrad)"/>
  </g>

  <!-- Tan accent stitching -->
  <path d="M185,292 L395,292" stroke="#C8A97A" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.5"/>
  <path d="M405,292 L615,292" stroke="#C8A97A" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.5"/>

  <!-- Label tag -->
  <rect x="372" y="248" width="56" height="26" rx="3" fill="#FAF8F4"/>
  <text x="400" y="265" font-family="sans-serif" font-size="9" fill="#1A1A1A" text-anchor="middle" font-weight="bold">C'ZED</text>

  <!-- Product label -->
  <text x="400" y="968" font-family="sans-serif" font-size="22" fill="#888" text-anchor="middle" font-weight="bold" letter-spacing="6" opacity="0.7">CORDUROY SHORTS</text>
</svg>
